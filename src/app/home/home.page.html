<ion-content>

  <h1><strong>My Workout Profiles</strong></h1>

   <div class="list">
    <ion-card *ngFor="let p of profiles; let i = index" (click)="openProfile(i)">
       <ion-card-content>
          <p>{{ p.name }}</p>
      </ion-card-content>
    </ion-card>
  </div>

  <ion-fab (click)="goToaddnew()">+</ion-fab>

</ion-content>
